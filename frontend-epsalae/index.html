<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/src/assets/webicon(40 x 40 px).png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Primary Meta Tags -->
    <title>Epasaley - Nepal's Trusted Online Store</title>
    <meta name="title" content="Epasaley - Nepal's Trusted Online Store" />
    <meta name="description" content="Shop the best products online in Nepal. Fast delivery, secure payments with Khalti & eSewa, Cash on Delivery available. Electronics, Fashion, Beauty & more." />
    <meta name="keywords" content="online shopping nepal, epasaley, ecommerce nepal, buy online nepal, khalti, esewa, cod nepal" />
    <meta name="author" content="Epasaley" />
    <meta name="robots" content="index, follow" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://epasaley.com/" />
    <meta property="og:title" content="Epasaley - Nepal's Trusted Online Store" />
    <meta property="og:description" content="Shop the best products online in Nepal. Fast delivery, secure payments with Khalti & eSewa, Cash on Delivery available." />
    <meta property="og:image" content="/src/assets/og-image.png" />
    <meta property="og:site_name" content="Epasaley" />
    <meta property="og:locale" content="en_US" />
    
    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://epasaley.com/" />
    <meta property="twitter:title" content="Epasaley - Nepal's Trusted Online Store" />
    <meta property="twitter:description" content="Shop the best products online in Nepal. Fast delivery, secure payments with Khalti & eSewa, Cash on Delivery available." />
    <meta property="twitter:image" content="/src/assets/og-image.png" />
    
    <!-- Theme Color -->
    <meta name="theme-color" content="#4A90E2" />
    <meta name="msapplication-TileColor" content="#4A90E2" />
    
    <!-- Preconnect to external domains for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://res.cloudinary.com" />
    <link rel="preconnect" href="%VITE_API_BASE_URL%" />
    
    <!-- DNS Prefetch -->
    <link rel="dns-prefetch" href="https://images.unsplash.com" />

    <!-- Referrer Policy -->
    <meta name="referrer" content="strict-origin-when-cross-origin" />

    <!--
      X-Frame-Options and X-Content-Type-Options are NOT recognized as
      meta http-equiv values by any browser — they only take effect as real
      HTTP response headers, which is why they're set in netlify.toml /
      vercel.json instead of here.
    -->

    <!--
      Fallback CSP for this SPA. The real enforcement point is the
      HTTP header set in netlify.toml / vercel.json (meta-tag CSP silently
      ignores `frame-ancestors` and `report-uri` per spec, so those two
      directives only work from the header version). Keep the two in sync.
    -->
    <meta http-equiv="Content-Security-Policy"
          content="
            default-src 'self';
            script-src 'self' 'unsafe-inline' https://hcaptcha.com https://*.hcaptcha.com;
            style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
            font-src 'self' https://fonts.gstatic.com;
            img-src 'self' data: https://res.cloudinary.com https://images.unsplash.com https://hcaptcha.com https://*.hcaptcha.com;
            connect-src 'self' %VITE_API_BASE_URL% https://hcaptcha.com https://*.hcaptcha.com;
            frame-src https://hcaptcha.com https://*.hcaptcha.com;
            object-src 'none';
            base-uri 'self';
          ">
  </head>
  <body>
    <div id="root">
      <!-- Shown while React JS chunks are downloading; React replaces this on mount -->
      <div id="app-loading" style="display:flex;min-height:100vh;align-items:center;justify-content:center;background:#fff;">
        <div style="text-align:center;">
          <div style="width:48px;height:48px;border:4px solid #e2e8f0;border-top-color:#1A3C8A;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 16px;"></div>
          <p style="color:#64748b;font-family:sans-serif;font-size:14px;margin:0;">Loading...</p>
        </div>
      </div>
      <style>#app-loading{position:fixed;inset:0;z-index:9999}@keyframes spin{to{transform:rotate(360deg)}}</style>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
