name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend-epasal
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend-epasal/package-lock.json
      - run: npm ci
      - name: Type check
        run: npx tsc --noEmit
      - name: Run test suite
        run: npm test

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend-epsalae
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend-epsalae/package-lock.json
      - run: npm ci
      - name: Production build
        run: npm run build

  frontend-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend-epsalae
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend-epsalae/package-lock.json
      - run: npm ci
      - name: Lint
        # Informational only for now — the existing codebase has pre-existing
        # lint findings unrelated to any given change. Flip this off once
        # those are cleaned up, so lint failures actually block merges.
        continue-on-error: true
        run: npm run lint
