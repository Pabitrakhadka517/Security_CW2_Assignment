name: Dependency Audit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1' # weekly, Monday 06:00 UTC

jobs:
  audit-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend-epasal
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend-epasal/package-lock.json
      - run: npm ci
      - run: npm run audit

  audit-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend-epsalae
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend-epsalae/package-lock.json
      - run: npm ci
      - run: npm run audit
